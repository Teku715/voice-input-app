<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>璇煶杈撳叆娉?/title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .text-area {
            width: 100%;
            height: 150px;
            border: 2px solid #ddd;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .text-area:focus {
            border-color: #667eea;
        }
        
        .mic-btn {
            display: block;
            margin: 30px auto 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .mic-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5);
        }
        
        .mic-btn.recording {
            animation: pulse 1s infinite;
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .status {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
            min-height: 20px;
        }
        
        .status.recording {
            color: #f5576c;
            font-weight: bold;
        }
        
        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        
        .btn:hover {
            opacity: 0.8;
        }
        
        .btn-copy {
            background: #667eea;
            color: white;
        }
        
        .btn-clear {
            background: #e0e0e0;
            color: #333;
        }
        
        .btn-ai {
            background: #764ba2;
            color: white;
        }
        
        .info {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>馃帳 璇煶杈撳叆娉?/h1>
        
        <textarea class="text-area" id="result" placeholder="鎸変笅鏂规寜閽紑濮嬭璇?.."></textarea>
        
        <button class="mic-btn" id="micBtn" title="鎸変綇璇磋瘽">馃帳</button>
        
        <div class="status" id="status">鍑嗗灏辩华锛岀偣鍑绘寜閽紑濮嬭璇?/div>
        
        <div class="actions">
            <button class="btn btn-copy" onclick="copyText()">澶嶅埗</button>
            <button class="btn btn-clear" onclick="clearText()">娓呯┖</button>
            <button class="btn btn-ai" onclick="improveWithAI()">AI浼樺寲</button>
        </div>
        
        <div class="info" id="info">璇嗗埆寮曟搸: Web Speech API</div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        
        // ========== 璁璇煶璇嗗埆 ==========
        const XUNFEI_APP_ID = '7780512';
        const XUNFEI_API_KEY = 'HPKPOKEY0KKJzupj7Nx0N9Di';
        const XUNFEI_API_SECRET = 'hr9XWQfoeA6sB2x5uGkGdxcgsemKL7Xg';
        const API_BASE = 'http://localhost:8080';
        
        // HMAC-SHA1 绛惧悕
        async function hmacSha1(secret, data) {
            const encoder = new TextEncoder();
            const keyData = encoder.encode(secret);
            const dataBuffer = encoder.encode(data);
            const cryptoKey = await crypto.subtle.importKey('raw', keyData, { name: 'HMAC', hash: 'SHA-1' }, false, ['sign']);
            const signature = await crypto.subtle.sign('HMAC', cryptoKey, dataBuffer);
            return btoa(String.fromCharCode(...new Uint8Array(signature)));
        }
        
        // 鐢熸垚璁璁よ瘉澶撮儴
        async function getXunfeiHeaders() {
            const ts = Math.floor(Date.now() / 1000);
            const signStr = XUNFEI_API_KEY + ts;
            const signature = await hmacSha1(XUNFEI_API_SECRET, signStr);
            return {
                'X-Appid': XUNFEI_APP_ID,
                'X-CurTime': ts.toString(),
                'X-Param': btoa(JSON.stringify({ aue: 'raw', authid: XUNFEI_APP_ID, result_type: 'complete', version: 'v2' })),
                'X-Signature': signature
            };
        }
        
        // 褰曢煶骞惰瘑鍒?        let mediaRecorder = null;
        let audioChunks = [];
        
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/pcm' });
                
                mediaRecorder.ondataavailable = async (e) => {
                    if (e.data.size > 0) {
                        audioChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/pcm' });
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    const base64Audio = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));
                    await sendToBackend(base64Audio);
                };
                
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                status.textContent = '馃帣锔?姝ｅ湪褰曢煶...';
                status.classList.add('recording');
            } catch (err) {
                status.textContent = '褰曢煶澶辫触: ' + err.message;
            }
        }
        
        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                status.textContent = '璇嗗埆涓?..';
                status.classList.remove('recording');
            }
        }
        
        async function sendToBackend(base64Audio) {
            try {
                const response = await fetch('http://localhost:8080/api/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: base64Audio })
                });
                const data = await response.json();
                if (data.result) {
                    result.value = data.result;
                    status.textContent = '鉁?璇嗗埆瀹屾垚';
                } else {
                    status.textContent = '璇嗗埆澶辫触锛岃閲嶈瘯';
                }
            } catch (e) {
                status.textContent = '璇嗗埆鍑洪敊: ' + e.message;
            }
        }
        
        // 鎸変綇璇磋瘽
        micBtn.addEventListener('mousedown', () => {
            startRecording();
        });
        
        micBtn.addEventListener('mouseup', () => {
            stopRecording();
        });
        
        micBtn.addEventListener('mouseleave', () => {
            if (isRecording) stopRecording();
        });
        
        // 瑙︽懜鏀寔
        micBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startRecording();
        });
        
        micBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            stopRecording();
        });
        
        info.textContent = '璇嗗埆寮曟搸: 璁璇煶API';
        
        
        function copyText() {
            if (result.value) {
                navigator.clipboard.writeText(result.value);
                status.textContent = '鉁?宸插鍒?;
                setTimeout(() => {
                    status.textContent = '鍑嗗灏辩华';
                }, 1500);
            }
        }
        
        function clearText() {
            result.value = '';
            status.textContent = '宸叉竻绌?;
            setTimeout(() => {
                status.textContent = '鍑嗗灏辩华';
            }, 1500);
        }
        
        async function improveWithAI() {
            if (!result.value.trim()) {
                status.textContent = '璇峰厛杈撳叆鏂囧瓧';
                return;
            }
            status.textContent = '馃 AI澶勭悊涓?..';
            try {
                const response = await fetch('http://localhost:8080/api/improve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: result.value })
                });
                const data = await response.json();
                result.value = data.result || data.error || '浼樺寲澶辫触';
                status.textContent = '鉁?AI浼樺寲瀹屾垚';
            } catch (e) {
                status.textContent = '璇锋眰澶辫触: ' + e.message;
            }
        }
    </script>
</body>
</html>
