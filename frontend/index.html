<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>иҜӯйҹіиҫ“е…Ҙжі•</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            background: white; border-radius: 20px; padding: 40px;
            width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .text-area {
            width: 100%; height: 150px; border: 2px solid #ddd;
            border-radius: 12px; padding: 15px; font-size: 16px; resize: none; outline: none;
        }
        .text-area:focus { border-color: #667eea; }
        .mic-btn {
            display: block; margin: 30px auto 20px;
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 28px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5); }
        .mic-btn.recording { animation: pulse 1s infinite; background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .status { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; min-height: 20px; }
        .status.recording { color: #f5576c; font-weight: bold; }
        .actions { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 10px 25px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-copy { background: #667eea; color: white; }
        .btn-clear { background: #e0e0e0; color: #333; }
        .btn-ai { background: #764ba2; color: white; }
        .info { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Г°ВҹВ“В» иҜӯйҹіиҫ“е…Ҙжі•</h1>
        <textarea class="text-area" id="result" placeholder="Г§ВіВ»ГҰЕ’вҖ°ГҰЕ’В¬Г©ВқЕҫГҰЕ’вҖ°Г©'ВұГҘВјвӮ¬ГҘВ§вҖ№ГЁВҜВҙГЁВҜпҝҪ..."></textarea>
        <button class="mic-btn" id="micBtn" title="Г§ВіВ»ГҰЕ’вҖ°ГЁВҜВҙГЁВҜВқ">Г°ВҹВ“В«</button>
        <div class="status" id="status">ГҘвҖЎвҖ ГҘВӨвҖЎГҘВ°ВұГ§В»ВӘГҜВјЕ’Г§вҖҡВ№ГҘвҖЎВ»ГҰЕ’В¬Г©'ВұГҘВјвӮ¬ГҘВ§вҖ№ГЁВҜВҙГЁВҜВұ</div>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyText()">ГҘВӨеӨҸГҘВ®Е’</button>
            <button class="btn btn-clear" onclick="clearText()">ГҰВёвҖҰГ§В©Вә</button>
            <button class="btn btn-ai" onclick="improveWithAI()">AIГӨВјЛңГҘЕ’вҖ“</button>
        </div>
        <div class="info" id="info">ГЁВҜвҖ ГҘЛҶВ«ГҘВјвҖўГҰвҖңЕҪ: Г§в„ўВҫГҘВәВҰГЁВҜВӯГ©ЕёВіГЁВҜвҖ ГҘЛҶВ«API</div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        const API_BASE = 'http://localhost:8080';
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioChunks = [];
                // дјҳе…ҲдҪҝз”Ёoggж јејҸпјҲзҷҫеәҰж”ҜжҢҒпјү
                let mimeType = 'audio/ogg';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'audio/webm';
                }
                mediaRecorder = new MediaRecorder(stream, { mimeType: mimeType });
                mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    const arrayBuffer = await audioBlob.arrayBuffer();
                    const uint8 = new Uint8Array(arrayBuffer);
                    let binary = '';
                    for (let i = 0; i < uint8.byteLength; i++) binary += String.fromCharCode(uint8[i]);
                    const base64Audio = btoa(binary);
                    await sendToBackend(base64Audio, mimeType);
                };
                mediaRecorder.start();
                isRecording = true;
                micBtn.classList.add('recording');
                status.textContent = 'Г§В·ЕЎГӨВёВӯ...';
                status.classList.add('recording');
            } catch (err) { status.textContent = 'ГҘВҪВұГҘЖ’ВҸГҘвҖўГҘВӨВұГЁВҙВҘ: ' + err.message; }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                status.textContent = 'ГЁВҜвҖ ГҘЛҶВ«ГӨВёВӯ...';
                status.classList.remove('recording');
            }
        }

        async function sendToBackend(base64Audio, mimeType) {
            try {
                const format = mimeType.includes('ogg') ? 'ogg' : 'webm';
                const response = await fetch(API_BASE + '/api/recognize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ audio: base64Audio, format: format })
                });
                const data = await response.json();
                result.value = data.result || data.error || 'ГЁВҜвҖ ГҘЛҶВ«ГҘВӨВұГЁВҙВҘ';
                status.textContent = data.result ? 'ГҘВ®Е’ГҰЛҶВҗ' : 'ГҘВӨВұГЁВҙВҘ';
            } catch (e) { status.textContent = 'ГЁВҜВ·ГҰВұвҖҡГҘВӨВұГЁВҙВҘ: ' + e.message; }
        }

        micBtn.addEventListener('mousedown', () => startRecording());
        micBtn.addEventListener('mouseup', () => stopRecording());
        micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
        micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
        micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });
        info.textContent = 'ГЁВҜвҖ ГҘЛҶВ«ГҘВјвҖўГҰвҖңЕҪ: Г§в„ўВҫГҘВәВҰГЁВҜВӯГ©ЕёВіГЁВҜвҖ ГҘЛҶВ«API';

        function copyText() {
            if (result.value) { navigator.clipboard.writeText(result.value); status.textContent = 'ГҘВ·ВІГҘВӨВҚГҘЛҶВ¶'; }
        }
        function clearText() { result.value = ''; status.textContent = 'ГҘВ·ВІГҰВёвҖҰГ§В©Вә'; }
        async function improveWithAI() {
            if (!result.value.trim()) { status.textContent = 'ГЁВҜВ·ГҘвҖҰе…үГҘвҖҰЛҶГЁВҫвҖңГҘвҖҰВҘГҰвҖ“вҖЎГҘВӯвҖ”'; return; }
            status.textContent = 'AIГҘВӨвҖһГ§ВҗвҖ ГӨВёВӯ...';
            try {
                const resp = await fetch(API_BASE + '/api/improve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: result.value })
                });
                const data = await resp.json();
                result.value = data.result || 'ГӨВјЛңГҘЕ’вҖ“ГҘВӨВұГЁВҙВҘ';
                status.textContent = 'AIГҘВ®Е’ГҰЛҶВҗ';
            } catch (e) { status.textContent = 'AIГҘВӨВұГЁВҙВҘ: ' + e.message; }
        }
    </script>
</body>
</html>
