<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音输入法</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            background: white; border-radius: 20px; padding: 40px;
            width: 90%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .text-area {
            width: 100%; height: 150px; border: 2px solid #ddd;
            border-radius: 12px; padding: 15px; font-size: 16px; resize: none; outline: none;
        }
        .text-area:focus { border-color: #667eea; }
        .mic-btn {
            display: block; margin: 30px auto 20px;
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; font-size: 28px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .mic-btn:hover { transform: scale(1.05); box-shadow: 0 10px 30px rgba(102, 126, 234, 0.5); }
        .mic-btn.recording { animation: pulse 1s infinite; background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .status { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; min-height: 20px; }
        .status.recording { color: #f5576c; font-weight: bold; }
        .actions { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 10px 25px; border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer; transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.8; }
        .btn-copy { background: #667eea; color: white; }
        .btn-clear { background: #e0e0e0; color: #333; }
        .btn-ai { background: #764ba2; color: white; }
        .info { text-align: center; margin-top: 20px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#127911; 语音输入法</h1>
        <textarea class="text-area" id="result" placeholder="按住按钮开始说话..."></textarea>
        <button class="mic-btn" id="micBtn" title="按住说话">&#127908;</button>
        <div class="status" id="status">准备就绪，点击按钮开始说话</div>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyText()">复制</button>
            <button class="btn btn-clear" onclick="clearText()">清空</button>
            <button class="btn btn-ai" onclick="improveWithAI()">AI优化</button>
        </div>
        <div class="info" id="info">识别引擎: 浏览器原生语音识别 (Web Speech API)</div>
    </div>

    <script>
        const micBtn = document.getElementById('micBtn');
        const result = document.getElementById('result');
        const status = document.getElementById('status');
        const info = document.getElementById('info');
        const API_BASE = 'http://localhost:8080';
        let recognition = null;

        // 检测浏览器是否支持Web Speech API
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            status.textContent = '浏览器不支持语音识别，请使用Chrome浏览器';
            info.textContent = '请使用Chrome/Edge浏览器';
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                status.textContent = '🔴 录音中...';
                status.classList.add('recording');
            };

            recognition.onresult = (event) => {
                let finalText = '';
                let interimText = '';
                for (let i = 0; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalText += transcript;
                    } else {
                        interimText += transcript;
                    }
                }
                if (finalText) {
                    result.value = finalText;
                    status.textContent = '✅ 识别完成';
                    status.classList.remove('recording');
                } else {
                    result.value = interimText;
                    status.textContent = '🔄 识别中...';
                }
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'no-speech') {
                    status.textContent = '未检测到语音，请重试';
                } else if (event.error === 'not-allowed') {
                    status.textContent = '请允许麦克风权限';
                } else {
                    status.textContent = '识别错误: ' + event.error;
                }
                status.classList.remove('recording');
                micBtn.classList.remove('recording');
            };

            recognition.onend = () => {
                isRecording = false;
                status.textContent = result.value ? '✅ 识别完成' : '⚠️ 未识别到内容';
                status.classList.remove('recording');
                micBtn.classList.remove('recording');
            };
        }

        let isRecording = false;

        function startRecording() {
            if (!recognition) {
                status.textContent = '浏览器不支持语音识别';
                return;
            }
            try {
                recognition.start();
            } catch (e) {
                // 可能已经在运行，先停止
                recognition.stop();
                setTimeout(() => recognition.start(), 100);
            }
        }

        function stopRecording() {
            if (recognition && isRecording) {
                recognition.stop();
            }
        }

        micBtn.addEventListener('mousedown', () => startRecording());
        micBtn.addEventListener('mouseup', () => stopRecording());
        micBtn.addEventListener('mouseleave', () => { if (isRecording) stopRecording(); });
        micBtn.addEventListener('touchstart', e => { e.preventDefault(); startRecording(); });
        micBtn.addEventListener('touchend', e => { e.preventDefault(); stopRecording(); });

        function copyText() {
            if (result.value) { navigator.clipboard.writeText(result.value); status.textContent = '✅ 已复制'; }
        }
        function clearText() { result.value = ''; status.textContent = '✅ 已清空'; }
        async function improveWithAI() {
            if (!result.value.trim()) { status.textContent = '请先输入文字'; return; }
            status.textContent = '🤖 AI处理中...';
            try {
                const resp = await fetch(API_BASE + '/api/improve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: result.value })
                });
                const data = await resp.json();
                result.value = data.result || '优化失败';
                status.textContent = '✅ AI优化完成';
            } catch (e) { status.textContent = 'AI失败: ' + e.message; }
        }
    </script>
</body>
</html>
